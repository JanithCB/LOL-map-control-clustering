# Clustering Hyperparameters

kmeans:
  n_clusters: 6          # Number of clusters to try
  random_state: 42
  n_init: 10
  max_iter: 300

gmm:
  n_components: 6
  covariance_type: "full"  # "full", "tied", "diag", "spherical"
  random_state: 42

hdbscan:
  min_cluster_size: 50
  min_samples: 10
  metric: "euclidean"

# Dimensionality reduction for visualization
tsne:
  n_components: 2
  perplexity: 30
  random_state: 42

umap:
  n_components: 2
  n_neighbors: 15
  min_dist: 0.1
  random_state: 42

# Feature scaling
preprocessing:
  scaler: "standard"  # "standard", "minmax", "robust"
