# configs/clustering_config.yaml

# K-means is the default MVP method for the first clustering pass.
# GMM and HDBSCAN are optional extensions for later experimentation.

random_state: 42

feature_scaling:
  enabled: true
  method: standard

clustering:
  default_method: "kmeans"
  candidate_k: [3, 4, 5, 6, 7, 8]

  kmeans:
    n_init: 20
    max_iter: 300

  gmm:
    covariance_type: "full"
    n_init: 5

  hdbscan:
    min_cluster_size: 25
    min_samples: 10

evaluation:
  use_silhouette: true
  use_davies_bouldin: true
  use_calinski_harabasz: true

embedding:
  method: "pca"
  n_components: 2
  umap_neighbors: 15
  umap_min_dist: 0.1

outputs:
  save_clustered_features: true
  save_centroids: true
  save_metrics: true